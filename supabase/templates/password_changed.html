<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Diperbarui — ChatCRM</title>
</head>
<body style="margin:0;padding:0;background-color:#F0F2F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#F0F2F5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:520px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(17,27,33,0.08);">
          <tr>
            <td style="background-color:#111B21;padding:24px 32px;text-align:center;">
              <span style="color:#ffffff;font-size:20px;font-weight:700;">ChatCRM</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h1 style="margin:0 0 12px;font-size:20px;font-weight:700;color:#111B21;">Password diperbarui</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#64748B;">
                Password untuk akun <strong>{{ .Email }}</strong> baru saja diubah.
              </p>
              <p style="margin:0;font-size:14px;line-height:1.6;color:#64748B;">
                Jika ini bukan Anda, segera hubungi owner workspace atau reset password di halaman login.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background-color:#F8FAFC;padding:16px 32px;text-align:center;border-top:1px solid #E2E8F0;">
              <p style="margin:0;font-size:12px;color:#94A3B8;">© ChatCRM</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
